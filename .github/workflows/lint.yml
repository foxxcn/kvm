name: lint
on:
  push:
    branches: [dev, main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "^1.25.1"
      - run: mkdir -p static && touch static/.gitkeep
      - uses: golangci/golangci-lint-action@v8
        with:
          args: --verbose
          version: v2.4

  ui:
    name: UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: "**/package-lock.json"
      - run: npm ci
        working-directory: ui
      - run: npm run lint
        working-directory: ui
